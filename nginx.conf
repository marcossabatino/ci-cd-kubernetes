server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_vary on;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Cache busting for assets
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # HTML files - no cache
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Health check endpoint (for Kubernetes)
  location /health {
    access_log off;
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }

  # Nginx metrics for Prometheus (restricted)
  location /nginx_status {
    stub_status on;
    access_log off;
    # Only allow from local network and localhost
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
  }

  # SPA routing: send all requests to index.html (for future JS routing)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
  }

  # Access logging with structured format
  access_log /var/log/nginx/access.log combined buffer=32k;
  error_log /var/log/nginx/error.log warn;
}
