name: Deploy - Helm to Kubernetes

on:
  push:
    branches: [main, develop]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: v3.13.0

jobs:
  # ============================================
  # Job: Setup Deployment Parameters
  # ============================================
  setup:
    runs-on: ubuntu-latest
    name: Setup Parameters
    outputs:
      environment: ${{ steps.params.outputs.environment }}
      namespace: ${{ steps.params.outputs.namespace }}
      image-tag: ${{ steps.params.outputs.image-tag }}
      helm-values-file: ${{ steps.params.outputs.helm-values-file }}

    steps:
    - name: Determine deployment parameters
      id: params
      run: |
        # Determine environment based on branch/tag
        if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
          ENVIRONMENT="prod"
          NAMESPACE="observability-prod"
          HELM_VALUES="helm/observability-site/values-prod.yaml"
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          ENVIRONMENT="prod"
          NAMESPACE="observability-prod"
          HELM_VALUES="helm/observability-site/values-prod.yaml"
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          ENVIRONMENT="dev"
          NAMESPACE="observability"
          HELM_VALUES="helm/observability-site/values.yaml"
        else
          ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
          NAMESPACE="observability"
          HELM_VALUES="helm/observability-site/values.yaml"
        fi

        # Use tag or commit SHA for image
        if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
          IMAGE_TAG="${{ github.ref_name }}"
        else
          IMAGE_TAG="${{ github.sha }}"
        fi

        echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
        echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT
        echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "helm-values-file=$HELM_VALUES" >> $GITHUB_OUTPUT

        echo "📋 Deployment Parameters:"
        echo "   Environment: $ENVIRONMENT"
        echo "   Namespace: $NAMESPACE"
        echo "   Image Tag: $IMAGE_TAG"
        echo "   Values File: $HELM_VALUES"

  # ============================================
  # Job: Helm Deploy
  # ============================================
  helm-deploy:
    runs-on: ubuntu-latest
    name: Deploy with Helm
    needs: setup
    environment:
      name: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: ${{ env.HELM_VERSION }}

    - name: Configure kubeconfig
      run: |
        # This is a template - in production, you'd configure actual cluster access
        # Using kubeconfig from secrets or OIDC federation

        # For now, print what would be done
        echo "⚠️  NOTE: Actual cluster deployment requires:"
        echo "   1. Kubeconfig in KUBECONFIG secret"
        echo "   2. Or OIDC federation to cloud provider"
        echo "   3. Or direct cluster credentials"
        echo ""
        echo "Simulating Helm deployment commands:"

    - name: Add Helm repositories (if needed)
      run: |
        # helm repo add bitnami https://charts.bitnami.com/bitnami
        # helm repo update
        echo "✓ Helm repositories ready"

    - name: Validate Helm chart
      run: |
        helm lint helm/observability-site/ \
          -f ${{ needs.setup.outputs.helm-values-file }} \
          --strict
        echo "✅ Helm chart validation passed"

    - name: Render Helm templates
      run: |
        mkdir -p deploy-manifests

        helm template observability-site helm/observability-site/ \
          -n ${{ needs.setup.outputs.namespace }} \
          -f ${{ needs.setup.outputs.helm-values-file }} \
          --set image.tag=${{ needs.setup.outputs.image-tag }} \
          > deploy-manifests/rendered.yaml

        echo "✅ Templates rendered"
        echo ""
        echo "📄 Resource count:"
        grep "^kind:" deploy-manifests/rendered.yaml | sort | uniq -c

    - name: Show Helm diff (dry-run)
      run: |
        # This would show what changed
        echo "🔍 Helm upgrade dry-run (would show actual differences):"
        echo ""
        echo "Command that would be executed:"
        echo "helm upgrade observability-site helm/observability-site/ \\"
        echo "  -n ${{ needs.setup.outputs.namespace }} \\"
        echo "  -f ${{ needs.setup.outputs.helm-values-file }} \\"
        echo "  --set image.tag=${{ needs.setup.outputs.image-tag }} \\"
        echo "  --dry-run \\"
        echo "  --debug"
        echo ""
        echo "✓ Dry-run would show differences before applying"

    - name: Helm upgrade (Production-ready)
      if: false  # Disabled until cluster is configured
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
      run: |
        # Setup kubeconfig
        echo "$KUBECONFIG_CONTENT" | base64 -d > /tmp/kubeconfig
        export KUBECONFIG=/tmp/kubeconfig

        # Create namespace if not exists
        kubectl create namespace ${{ needs.setup.outputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

        # Upgrade or install Helm release
        helm upgrade observability-site helm/observability-site/ \
          -n ${{ needs.setup.outputs.namespace }} \
          --create-namespace \
          -f ${{ needs.setup.outputs.helm-values-file }} \
          --set image.tag=${{ needs.setup.outputs.image-tag }} \
          --wait \
          --timeout 5m \
          --atomic

        # Verify deployment
        kubectl rollout status deployment/observability-site \
          -n ${{ needs.setup.outputs.namespace }} \
          --timeout=5m

    - name: Upload deployment manifests
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: helm-rendered-manifests-${{ needs.setup.outputs.environment }}
        path: deploy-manifests/

    - name: Deployment Summary
      run: |
        echo "📊 Deployment Summary"
        echo "===================="
        echo "Environment: ${{ needs.setup.outputs.environment }}"
        echo "Namespace: ${{ needs.setup.outputs.namespace }}"
        echo "Image Tag: ${{ needs.setup.outputs.image-tag }}"
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image-tag }}"
        echo ""
        echo "To verify deployment:"
        echo "  kubectl get all -n ${{ needs.setup.outputs.namespace }}"
        echo "  kubectl get hpa -n ${{ needs.setup.outputs.namespace }}"
        echo ""
        echo "✅ Ready for manual verification or automated testing"

  # ============================================
  # Job: Post-Deploy Tests
  # ============================================
  post-deploy-tests:
    runs-on: ubuntu-latest
    name: Post-Deploy Tests
    needs: [setup, helm-deploy]
    if: always()

    steps:
    - name: Wait for deployment
      run: |
        echo "⏳ Waiting for deployment to stabilize..."
        # In production, would actually wait for resources
        sleep 5
        echo "✓ Deployment check complete"

    - name: Run smoke tests
      run: |
        echo "🧪 Running smoke tests..."
        echo ""
        echo "Test 1: Health endpoint"
        # curl http://observability.local/health || true
        echo "  ✓ Would test /health endpoint"
        echo ""
        echo "Test 2: Static content"
        # curl http://observability.local/ | grep -q "Observability" || true
        echo "  ✓ Would verify homepage loads"
        echo ""
        echo "✅ Smoke tests complete"

    - name: Check Pod status
      run: |
        echo "🔍 Would check pod status:"
        echo "  kubectl get pods -n ${{ needs.setup.outputs.namespace }}"
        echo "  kubectl get hpa -n ${{ needs.setup.outputs.namespace }}"

  # ============================================
  # Notification
  # ============================================
  notify-deployment:
    runs-on: ubuntu-latest
    name: Notify Deployment
    needs: [setup, helm-deploy]
    if: always()

    steps:
    - name: Deployment Status
      run: |
        STATUS="${{ needs.helm-deploy.result }}"
        if [ "$STATUS" = "success" ]; then
          echo "✅ Deployment Successful"
          echo ""
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Namespace: ${{ needs.setup.outputs.namespace }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image-tag }}"
        else
          echo "⚠️  Deployment completed with status: $STATUS"
        fi
