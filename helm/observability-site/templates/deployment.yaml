apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability-site.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "observability-site.labels" . | nindent 4 }}
  annotations:
    description: "Observability Portal - Static site on Kubernetes"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "observability-site.selectorLabels" . | nindent 6 }}
      tier: web
  template:
    metadata:
      labels:
        {{- include "observability-site.selectorLabels" . | nindent 8 }}
        tier: web
        version: {{ .Chart.AppVersion | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.containerPort }}"
        prometheus.io/path: "/nginx_status"
    spec:
      {{- with .Values.securityContext.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}

      containers:
      - name: {{ include "observability-site.name" . }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.containerPort }}
          protocol: TCP

        {{- if .Values.configMap.enabled }}
        envFrom:
        - configMapRef:
            name: {{ include "observability-site.fullname" . }}-config
        {{- end }}

        resources:
          {{- toYaml .Values.resources | nindent 12 }}

        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}

        {{- with .Values.securityContext.container }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- if .Values.lifecycle }}
        lifecycle:
          {{- if .Values.lifecycle.preStop }}
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep {{ .Values.lifecycle.preStop.sleep }}"]
          {{- end }}
        {{- end }}

      restartPolicy: {{ .Values.restartPolicy }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      dnsPolicy: {{ .Values.dnsPolicy }}
