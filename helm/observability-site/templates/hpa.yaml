{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "observability-site.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "observability-site.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "observability-site.fullname" . }}

  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.metrics.cpu.targetAverageUtilization }}

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.metrics.memory.targetAverageUtilization }}

  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- with .scaleUp }}
    scaleUp:
      stabilizationWindowSeconds: {{ .stabilizationWindowSeconds }}
      policies:
        {{- toYaml .policies | nindent 8 }}
      selectPolicy: {{ .selectPolicy }}
    {{- end }}

    {{- with .scaleDown }}
    scaleDown:
      stabilizationWindowSeconds: {{ .stabilizationWindowSeconds }}
      policies:
        {{- toYaml .policies | nindent 8 }}
    {{- end }}
  {{- end }}
{{- end }}
