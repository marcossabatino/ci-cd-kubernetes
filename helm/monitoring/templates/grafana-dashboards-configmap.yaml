apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-grafana-dashboards
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  nginx-metrics.json: |
    {
      "dashboard": {
        "title": "Nginx Metrics",
        "uid": "nginx-metrics",
        "version": 1,
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Requests per Second",
            "targets": [
              {
                "expr": "rate(nginx_http_requests_total[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "id": 2,
            "title": "Request Latency (p95)",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(request_duration_seconds_bucket[5m]))"
              }
            ],
            "type": "graph"
          },
          {
            "id": 3,
            "title": "Status Codes Distribution",
            "targets": [
              {
                "expr": "sum(rate(nginx_http_requests_total[5m])) by (status)"
              }
            ],
            "type": "piechart"
          },
          {
            "id": 4,
            "title": "Active Connections",
            "targets": [
              {
                "expr": "nginx_connections_active"
              }
            ],
            "type": "gauge"
          },
          {
            "id": 5,
            "title": "Error Rate",
            "targets": [
              {
                "expr": "sum(rate(nginx_http_requests_total{status=~\"5..\"}[5m])) / sum(rate(nginx_http_requests_total[5m]))"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }

  kubernetes-pods.json: |
    {
      "dashboard": {
        "title": "Kubernetes Pods",
        "uid": "kubernetes-pods",
        "version": 1,
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Pod CPU Usage",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)"
              }
            ],
            "type": "graph"
          },
          {
            "id": 2,
            "title": "Pod Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_working_set_bytes) by (pod) / 1024 / 1024"
              }
            ],
            "type": "graph"
          },
          {
            "id": 3,
            "title": "Pod Restarts",
            "targets": [
              {
                "expr": "sum(kube_pod_container_status_restarts_total) by (pod)"
              }
            ],
            "type": "table"
          },
          {
            "id": 4,
            "title": "Pod Status",
            "targets": [
              {
                "expr": "kube_pod_status_phase"
              }
            ],
            "type": "stat"
          }
        ]
      }
    }

  logs-overview.json: |
    {
      "dashboard": {
        "title": "Logs Overview",
        "uid": "logs-overview",
        "version": 1,
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Log Entries",
            "targets": [
              {
                "expr": "{job=\"kubernetes-pods\"}"
              }
            ],
            "type": "logs"
          },
          {
            "id": 2,
            "title": "Log Levels Distribution",
            "targets": [
              {
                "expr": "sum by (level) (count_over_time({job=\"kubernetes-pods\"} | json | level != \"\" [5m]))"
              }
            ],
            "type": "piechart"
          },
          {
            "id": 3,
            "title": "Error Logs",
            "targets": [
              {
                "expr": "{job=\"kubernetes-pods\"} | json | level=\"error\""
              }
            ],
            "type": "logs"
          }
        ]
      }
    }

  cluster-overview.json: |
    {
      "dashboard": {
        "title": "Cluster Overview",
        "uid": "cluster-overview",
        "version": 1,
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Cluster CPU Usage",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) / sum(machine_cpu_cores) * 100"
              }
            ],
            "type": "gauge"
          },
          {
            "id": 2,
            "title": "Cluster Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_working_set_bytes) / sum(machine_memory_bytes) * 100"
              }
            ],
            "type": "gauge"
          },
          {
            "id": 3,
            "title": "Node Status",
            "targets": [
              {
                "expr": "kube_node_status_condition"
              }
            ],
            "type": "table"
          },
          {
            "id": 4,
            "title": "Persistent Volumes",
            "targets": [
              {
                "expr": "kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }
